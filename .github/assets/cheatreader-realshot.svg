<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" fill="#0F1115"/>
  <rect width="1440" height="900" fill="url(#bg)"/>

  <rect x="96" y="88" width="1248" height="724" rx="32" fill="#15181D" fill-opacity="0.90" stroke="rgba(255,255,255,0.08)"/>
  <rect x="96" y="88" width="1248" height="54" rx="32" fill="#1C2128"/>
  <circle cx="134" cy="115" r="8" fill="#FF6157"/>
  <circle cx="162" cy="115" r="8" fill="#FEBB2E"/>
  <circle cx="190" cy="115" r="8" fill="#28C840"/>

  <rect x="142" y="182" width="972" height="94" rx="30" fill="#3A2F2B" fill-opacity="0.96"/>
  <text x="182" y="238" fill="#FFF9F2" font-family="Georgia, 'Times New Roman', serif" font-size="34">当龙骨焚箱的焰火燃起，那些神秘家族、古老传闻与未解的踪迹</text>

  <rect x="142" y="334" width="760" height="392" rx="30" fill="#181412" fill-opacity="0.88" stroke="rgba(255,255,255,0.08)"/>
  <text x="180" y="392" fill="#EEDFD2" font-family="Arial, sans-serif" font-size="20" font-weight="700">Multi-line mode</text>
  <text x="180" y="444" fill="#FFF9F2" font-family="Georgia, 'Times New Roman', serif" font-size="28">它不是传统阅读器那样铺满整个屏幕，</text>
  <text x="180" y="484" fill="#FFF9F2" font-family="Georgia, 'Times New Roman', serif" font-size="28">而是保留一种克制的存在感：足够可读，</text>
  <text x="180" y="524" fill="#FFF9F2" font-family="Georgia, 'Times New Roman', serif" font-size="28">又不至于把你的工作界面变成另一个世界。</text>
  <text x="180" y="564" fill="#FFF9F2" font-family="Georgia, 'Times New Roman', serif" font-size="28">你可以在浏览器、终端、IM 窗口之间穿梭，</text>
  <text x="180" y="604" fill="#FFF9F2" font-family="Georgia, 'Times New Roman', serif" font-size="28">但书会一直停在刚才那一段，等你继续往下读。</text>
  <text x="180" y="670" fill="#CDB9A9" font-family="Arial, sans-serif" font-size="17">Drag-and-drop import, 5-line default reading area, keyboard and mouse controls.</text>

  <rect x="954" y="334" width="308" height="172" rx="28" fill="#0F0C0B" fill-opacity="0.84" stroke="rgba(255,255,255,0.08)"/>
  <text x="984" y="384" fill="#E8D8CA" font-family="Arial, sans-serif" font-size="20" font-weight="700">Transparent Mode</text>
  <text x="984" y="420" fill="#D7C7B9" font-family="Arial, sans-serif" font-size="16">The app can drop every background tint</text>
  <text x="984" y="446" fill="#D7C7B9" font-family="Arial, sans-serif" font-size="16">and leave only the text floating above</text>
  <text x="984" y="472" fill="#D7C7B9" font-family="Arial, sans-serif" font-size="16">your desktop.</text>

  <rect x="954" y="554" width="308" height="172" rx="28" fill="#0F0C0B" fill-opacity="0.84" stroke="rgba(255,255,255,0.08)"/>
  <text x="984" y="604" fill="#E8D8CA" font-family="Arial, sans-serif" font-size="20" font-weight="700">Formats</text>
  <rect x="984" y="636" width="76" height="34" rx="17" fill="#F0E6DC"/>
  <text x="1008" y="658" fill="#17110F" font-family="Arial, sans-serif" font-size="15" font-weight="700">TXT</text>
  <rect x="1072" y="636" width="86" height="34" rx="17" fill="#29414D"/>
  <text x="1099" y="658" fill="#EEF5F7" font-family="Arial, sans-serif" font-size="15" font-weight="700">EPUB</text>
  <rect x="1170" y="636" width="74" height="34" rx="17" fill="#8B6B60"/>
  <text x="1194" y="658" fill="#FFF7F0" font-family="Arial, sans-serif" font-size="15" font-weight="700">FB2</text>
  <text x="984" y="704" fill="#D7C7B9" font-family="Arial, sans-serif" font-size="16">HTML / Markdown / XHTML also supported.</text>

  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1350" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D2320"/>
      <stop offset="0.58" stop-color="#111315"/>
      <stop offset="1" stop-color="#223C47"/>
    </linearGradient>
  </defs>
</svg>
