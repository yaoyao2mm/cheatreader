  <rect x="170" y="138" width="1100" height="610" rx="34" fill="#14181D" fill-opacity="0.70" stroke="rgba(255,255,255,0.06)"/>
  <rect x="170" y="138" width="1100" height="52" rx="34" fill="#1B2027"/>
