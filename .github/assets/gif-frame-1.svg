<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#111317"/>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="70" y="72" width="1140" height="576" rx="28" fill="#171413" fill-opacity="0.80" stroke="rgba(255,255,255,0.08)"/>
  <text x="96" y="124" fill="#E7D6C8" font-family="Arial, sans-serif" font-size="20" font-weight="700">Step 1 · Multi-line reading</text>
  <rect x="106" y="170" width="760" height="320" rx="28" fill="#1B1715" stroke="rgba(255,255,255,0.06)"/>
  <text x="136" y="236" fill="#FFF8F1" font-family="Georgia, 'Times New Roman', serif" font-size="31">它保留多行阅读时的完整节奏，</text>
  <text x="136" y="278" fill="#FFF8F1" font-family="Georgia, 'Times New Roman', serif" font-size="31">像一张安静地浮在桌面的纸条。</text>
  <text x="136" y="320" fill="#FFF8F1" font-family="Georgia, 'Times New Roman', serif" font-size="31">你不必离开当前工作环境，</text>
  <text x="136" y="362" fill="#FFF8F1" font-family="Georgia, 'Times New Roman', serif" font-size="31">也不需要切到另一个沉浸式应用里。</text>
  <rect x="920" y="192" width="208" height="44" rx="22" fill="#EEDFD2"/>
  <text x="952" y="220" fill="#18120F" font-family="Arial, sans-serif" font-size="18" font-weight="700">Double click to switch</text>
  <defs>
    <linearGradient id="bg" x1="42" y1="20" x2="1236" y2="702" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E2521"/>
      <stop offset="0.6" stop-color="#121315"/>
      <stop offset="1" stop-color="#213743"/>
    </linearGradient>
  </defs>
</svg>
