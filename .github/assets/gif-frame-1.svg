<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" fill="#111317"/>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect x="108" y="108" width="1224" height="684" rx="32" fill="#171413" fill-opacity="0.82" stroke="rgba(255,255,255,0.08)"/>
  <text x="146" y="170" fill="#E7D6C8" font-family="Arial, sans-serif" font-size="22" font-weight="700">Step 1 · Multi-line reading</text>
  <rect x="160" y="232" width="808" height="332" rx="30" fill="#1B1715" stroke="rgba(255,255,255,0.06)"/>
  <text x="198" y="304" fill="#FFF8F1" font-family="Georgia, 'Times New Roman', serif" font-size="29">它保留多行阅读时的完整节奏，</text>
  <text x="198" y="344" fill="#FFF8F1" font-family="Georgia, 'Times New Roman', serif" font-size="29">像一张安静地浮在桌面的纸条。</text>
  <text x="198" y="384" fill="#FFF8F1" font-family="Georgia, 'Times New Roman', serif" font-size="29">你不必离开当前工作环境，</text>
  <text x="198" y="424" fill="#FFF8F1" font-family="Georgia, 'Times New Roman', serif" font-size="29">也不需要切到另一个沉浸式应用里。</text>
  <rect x="1030" y="256" width="214" height="44" rx="22" fill="#EEDFD2"/>
  <text x="1061" y="284" fill="#18120F" font-family="Arial, sans-serif" font-size="18" font-weight="700">Double click to switch</text>
  <defs>
    <linearGradient id="bg" x1="44" y1="24" x2="1370" y2="878" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E2521"/>
      <stop offset="0.6" stop-color="#121315"/>
      <stop offset="1" stop-color="#213743"/>
    </linearGradient>
  </defs>
</svg>
