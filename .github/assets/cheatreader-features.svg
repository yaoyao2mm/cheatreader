<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" fill="#12100F"/>
  <rect width="1440" height="900" fill="url(#bg)"/>

  <rect x="96" y="88" width="1248" height="724" rx="30" fill="#171413" fill-opacity="0.84" stroke="rgba(255,255,255,0.08)"/>
  <text x="132" y="152" fill="#F8F0E8" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700">Feature Highlights</text>
  <text x="132" y="190" fill="#DCC9BA" font-family="Arial, sans-serif" font-size="22">Three focused interactions that define CheatReader.</text>

  <rect x="132" y="242" width="340" height="500" rx="30" fill="#1A1614" stroke="rgba(255,255,255,0.08)"/>
  <text x="164" y="294" fill="#FFF7F0" font-family="Arial, sans-serif" font-size="24" font-weight="700">Transparent Mode</text>
  <text x="164" y="330" fill="#D8C7B8" font-family="Arial, sans-serif" font-size="16">Text stays readable while the app fades into your desktop.</text>
  <text x="164" y="356" fill="#D8C7B8" font-family="Arial, sans-serif" font-size="16">Only text remains. No tinted card behind it.</text>
  <rect x="164" y="414" width="276" height="132" rx="24" fill="#0F0C0B"/>
  <rect x="190" y="458" width="224" height="38" rx="19" fill="#000000" fill-opacity="0.16"/>
  <text x="212" y="483" fill="#FFF8F2" font-family="Georgia, 'Times New Roman', serif" font-size="18">那些故事不会打断你的工作流</text>
  <text x="164" y="620" fill="#CDB9A9" font-family="Arial, sans-serif" font-size="15">No tinted panel.</text>
  <text x="164" y="644" fill="#CDB9A9" font-family="Arial, sans-serif" font-size="15">No half-transparent card.</text>
  <text x="164" y="668" fill="#CDB9A9" font-family="Arial, sans-serif" font-size="15">Just text.</text>

  <rect x="550" y="242" width="340" height="500" rx="30" fill="#1A1614" stroke="rgba(255,255,255,0.08)"/>
  <text x="582" y="294" fill="#FFF7F0" font-family="Arial, sans-serif" font-size="24" font-weight="700">One-line Reading</text>
  <text x="582" y="330" fill="#D8C7B8" font-family="Arial, sans-serif" font-size="16">A thin strip for peripheral reading, with visual-line stepping.</text>
  <text x="582" y="356" fill="#D8C7B8" font-family="Arial, sans-serif" font-size="16">Compact when it needs to disappear into the edge.</text>
  <rect x="582" y="418" width="276" height="54" rx="27" fill="#3A2F2B"/>
  <text x="616" y="452" fill="#FFF8F2" font-family="Georgia, 'Times New Roman', serif" font-size="20">这就是最小模式下的一条阅读带</text>
  <rect x="582" y="516" width="276" height="110" rx="24" fill="#0F0C0B"/>
  <text x="610" y="560" fill="#E8D8CA" font-family="Arial, sans-serif" font-size="15">Switch via double click, middle click,</text>
  <text x="610" y="584" fill="#E8D8CA" font-family="Arial, sans-serif" font-size="15">or a keyboard shortcut.</text>
  <text x="582" y="668" fill="#CDB9A9" font-family="Arial, sans-serif" font-size="15">Compact when you need it.</text>
  <text x="582" y="692" fill="#CDB9A9" font-family="Arial, sans-serif" font-size="15">Expandable when you do not.</text>

  <rect x="968" y="242" width="340" height="500" rx="30" fill="#1A1614" stroke="rgba(255,255,255,0.08)"/>
  <text x="1000" y="294" fill="#FFF7F0" font-family="Arial, sans-serif" font-size="24" font-weight="700">Multi-format Import</text>
  <text x="1000" y="330" fill="#D8C7B8" font-family="Arial, sans-serif" font-size="16">Bring different ebook sources into one calm reading flow.</text>
  <text x="1000" y="356" fill="#D8C7B8" font-family="Arial, sans-serif" font-size="16">All formats are normalized into the same lightweight reader.</text>
  <rect x="1000" y="418" width="82" height="38" rx="19" fill="#F0E6DC"/>
  <text x="1027" y="442" fill="#17110F" font-family="Arial, sans-serif" font-size="16" font-weight="700">TXT</text>
  <rect x="1094" y="418" width="94" height="38" rx="19" fill="#2D4A57"/>
  <text x="1124" y="442" fill="#EDF4F6" font-family="Arial, sans-serif" font-size="16" font-weight="700">EPUB</text>
  <rect x="1200" y="418" width="82" height="38" rx="19" fill="#8D6D61"/>
  <text x="1226" y="442" fill="#FFF8F0" font-family="Arial, sans-serif" font-size="16" font-weight="700">FB2</text>
  <rect x="1000" y="470" width="96" height="38" rx="19" fill="#5E4A43"/>
  <text x="1025" y="494" fill="#FFF8F0" font-family="Arial, sans-serif" font-size="16" font-weight="700">HTML</text>
  <rect x="1108" y="470" width="126" height="38" rx="19" fill="#243C46"/>
  <text x="1133" y="494" fill="#EDF4F6" font-family="Arial, sans-serif" font-size="16" font-weight="700">Markdown</text>
  <rect x="1000" y="548" width="276" height="118" rx="24" fill="#0F0C0B"/>
  <text x="1026" y="592" fill="#E8D8CA" font-family="Arial, sans-serif" font-size="15">Everything is normalized into text-first reading,</text>
  <text x="1026" y="616" fill="#E8D8CA" font-family="Arial, sans-serif" font-size="15">so the experience stays lightweight, calm,</text>
  <text x="1026" y="640" fill="#E8D8CA" font-family="Arial, sans-serif" font-size="15">and consistent across formats.</text>

  <defs>
    <linearGradient id="bg" x1="74" y1="42" x2="1366" y2="858" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2B221E"/>
      <stop offset="0.56" stop-color="#141211"/>
      <stop offset="1" stop-color="#203742"/>
    </linearGradient>
  </defs>
</svg>
