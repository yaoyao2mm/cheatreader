name: Release Desktop Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve_tag.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  verify:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev liblzma-dev

      - name: Set up Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" --version

      - name: Fetch dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build:
    needs: [prepare, verify]
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
            artifact_name: cheatreader-macos
            build_output: build/macos/Build/Products/Release/cheatreader.app
          - os: windows-latest
            target: windows
            artifact_name: cheatreader-windows
            build_output: build/windows/x64/runner/Release
          - os: ubuntu-latest
            target: linux
            artifact_name: cheatreader-linux
            build_output: build/linux/x64/release/bundle
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev liblzma-dev

      - name: Set up Flutter on macOS/Linux
        if: matrix.target != 'windows'
        shell: bash
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" --version

      - name: Set up Flutter on Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$env:USERPROFILE\flutter"
          "$env:USERPROFILE\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:USERPROFILE\flutter\bin\flutter.bat" --version

      - name: Fetch dependencies
        run: flutter pub get

      - name: Build desktop release
        run: flutter build ${{ matrix.target }} --release

      - name: Package release asset
        shell: pwsh
        run: |
          $stagingRoot = Join-Path $env:RUNNER_TEMP "${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Force -Path $stagingRoot | Out-Null

          if ("${{ matrix.target }}" -eq "macos") {
            Copy-Item "${{ matrix.build_output }}" -Destination $stagingRoot -Recurse
          } elseif ("${{ matrix.target }}" -eq "windows") {
            $dest = Join-Path $stagingRoot "cheatreader"
            Copy-Item "${{ matrix.build_output }}" -Destination $dest -Recurse
          } else {
            $dest = Join-Path $stagingRoot "cheatreader"
            Copy-Item "${{ matrix.build_output }}" -Destination $dest -Recurse
          }

          $archiveName = "cheatreader-$env:RELEASE_TAG-${{ matrix.target }}.zip"
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }
          Compress-Archive -Path (Join-Path $stagingRoot '*') -DestinationPath $archivePath

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/cheatreader-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              gh release create "$RELEASE_TAG" --target "${GITHUB_SHA}" --title "$RELEASE_TAG" --generate-notes
            else
              gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
            fi
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          shopt -s nullglob
          assets=(dist/**/*.zip)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
