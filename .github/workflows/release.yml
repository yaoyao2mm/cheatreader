name: Release Desktop Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve_tag.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  verify:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev liblzma-dev

      - name: Set up Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" --version

      - name: Fetch dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build:
    needs: [prepare, verify]
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
            artifact_name: cheatreader-macos
            build_output: build/macos/Build/Products/Release/cheatreader.app
            release_asset: cheatreader-${{ needs.prepare.outputs.release_tag }}-macos.dmg
          - os: windows-latest
            target: windows
            artifact_name: cheatreader-windows
            build_output: build/windows/x64/runner/Release
            release_asset: cheatreader-${{ needs.prepare.outputs.release_tag }}-windows-setup.exe
          - os: ubuntu-22.04
            target: linux
            artifact_name: cheatreader-linux
            build_output: build/linux/x64/release/bundle
            release_asset: cheatreader-${{ needs.prepare.outputs.release_tag }}-linux.deb
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Linux Docker availability
        if: matrix.target == 'linux'
        run: |
          docker --version

      - name: Set up Flutter on macOS/Linux
        if: matrix.target == 'macos'
        shell: bash
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" --version

      - name: Set up Flutter on Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$env:USERPROFILE\flutter"
          "$env:USERPROFILE\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:USERPROFILE\flutter\bin\flutter.bat" --version

      - name: Fetch dependencies
        if: matrix.target != 'linux'
        run: flutter pub get

      - name: Build desktop release
        if: matrix.target != 'linux'
        run: flutter build ${{ matrix.target }} --release --split-debug-info=build/debug-info/${{ matrix.target }}

      - name: Build Linux release on Ubuntu 20.04 baseline
        if: matrix.target == 'linux'
        shell: bash
        run: |
          docker run --rm \
            --platform linux/amd64 \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            ubuntu:20.04 \
            bash .github/scripts/build-linux-focal-release.sh

      - name: Package macOS DMG
        if: matrix.target == 'macos'
        shell: bash
        run: |
          STAGING_DIR="$RUNNER_TEMP/dmg-root"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          cp -R "${{ matrix.build_output }}" "$STAGING_DIR/cheatreader.app"
          ln -s /Applications "$STAGING_DIR/Applications"
          hdiutil create \
            -volname "CheatReader" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$RUNNER_TEMP/${{ matrix.release_asset }}"

      - name: Package Windows installer
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $issPath = Join-Path $env:RUNNER_TEMP "cheatreader-installer.iss"
          $outputDir = $env:RUNNER_TEMP.Replace('\', '\\')
          $sourceDir = (Resolve-Path "${{ matrix.build_output }}").Path.Replace('\', '\\')
          $iconPath = (Resolve-Path "windows/runner/resources/app_icon.ico").Path.Replace('\', '\\')
          $releaseTag = $env:RELEASE_TAG
          @(
            '[Setup]'
            'AppName=CheatReader'
            "AppVersion=$releaseTag"
            'DefaultDirName={autopf}\CheatReader'
            'DefaultGroupName=CheatReader'
            "OutputDir=$outputDir"
            "OutputBaseFilename=cheatreader-$releaseTag-windows-setup"
            'Compression=lzma2'
            'SolidCompression=yes'
            'WizardStyle=modern'
            'ArchitecturesInstallIn64BitMode=x64compatible'
            "SetupIconFile=$iconPath"
            'UninstallDisplayIcon={app}\cheatreader.exe'
            ''
            '[Tasks]'
            'Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"; Flags: unchecked'
            ''
            '[Files]'
            "Source: `"$sourceDir\*`"; DestDir: `"{app}`"; Flags: ignoreversion recursesubdirs createallsubdirs"
            ''
            '[Icons]'
            'Name: "{group}\CheatReader"; Filename: "{app}\cheatreader.exe"'
            'Name: "{autodesktop}\CheatReader"; Filename: "{app}\cheatreader.exe"; Tasks: desktopicon'
            ''
            '[Run]'
            'Filename: "{app}\cheatreader.exe"; Description: "Launch CheatReader"; Flags: nowait postinstall skipifsilent'
          ) -join "`n" | Set-Content -Path $issPath -Encoding UTF8

          $iscc = Get-Command iscc -ErrorAction SilentlyContinue
          if (-not $iscc) {
            $fallback = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
            if (Test-Path $fallback) {
              & $fallback $issPath
            } else {
              throw "Inno Setup compiler not found on runner."
            }
          } else {
            & $iscc.Source $issPath
          }

      - name: Package Linux DEB
        if: matrix.target == 'linux'
        shell: bash
        run: |
          PACKAGE_ROOT="$RUNNER_TEMP/cheatreader-deb"
          APP_ROOT="$PACKAGE_ROOT/opt/cheatreader"
          DESKTOP_DIR="$PACKAGE_ROOT/usr/share/applications"
          ICON_DIR="$PACKAGE_ROOT/usr/share/icons/hicolor/256x256/apps"
          DEBIAN_DIR="$PACKAGE_ROOT/DEBIAN"
          BIN_DIR="$PACKAGE_ROOT/usr/bin"

          rm -rf "$PACKAGE_ROOT"
          mkdir -p "$APP_ROOT" "$DESKTOP_DIR" "$ICON_DIR" "$DEBIAN_DIR" "$BIN_DIR"
          cp -R "${{ matrix.build_output }}/." "$APP_ROOT/"
          cp snap/gui/app_icon.png "$ICON_DIR/cheatreader.png"

          printf '%s\n' \
            '#!/usr/bin/env sh' \
            'cd /opt/cheatreader || exit 1' \
            'exec /opt/cheatreader/cheatreader "$@"' \
            > "$BIN_DIR/cheatreader"

          {
            echo '[Desktop Entry]'
            echo 'Name=CheatReader'
            echo 'Comment=Floating desktop reader for low-distraction reading'
            echo 'Exec=/usr/bin/cheatreader'
            echo 'Icon=cheatreader'
            echo 'Path=/opt/cheatreader'
            echo 'Terminal=false'
            echo 'Type=Application'
            echo 'Categories=Office;Viewer;Utility;'
            echo 'StartupNotify=true'
          } > "$DESKTOP_DIR/cheatreader.desktop"

          {
            echo 'Package: cheatreader'
            echo "Version: ${RELEASE_TAG#v}"
            echo 'Section: utils'
            echo 'Priority: optional'
            echo 'Architecture: amd64'
            echo 'Maintainer: yaoyao2mm <yaoyao2mm@users.noreply.github.com>'
            echo 'Description: Floating desktop reader for low-distraction reading'
            echo 'Depends: libgtk-3-0, libblkid1, liblzma5, libstdc++6'
          } > "$DEBIAN_DIR/control"

          chmod 0755 "$DEBIAN_DIR"
          find "$PACKAGE_ROOT/opt" -type f -exec chmod 0644 {} \;
          chmod 0755 "$APP_ROOT/cheatreader"
          chmod 0755 "$BIN_DIR/cheatreader"
          chmod 0644 "$DESKTOP_DIR/cheatreader.desktop"
          chmod 0644 "$ICON_DIR/cheatreader.png"
          dpkg-deb --build --root-owner-group "$PACKAGE_ROOT" "$RUNNER_TEMP/${{ matrix.release_asset }}"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/${{ matrix.release_asset }}
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              gh release create "$RELEASE_TAG" --repo "${GITHUB_REPOSITORY}" --target "${GITHUB_SHA}" --title "$RELEASE_TAG" --generate-notes
            else
              gh release create "$RELEASE_TAG" --repo "${GITHUB_REPOSITORY}" --title "$RELEASE_TAG" --generate-notes
            fi
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          shopt -s nullglob
          assets=(dist/**/*.{dmg,deb,exe})
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi
          gh release upload "$RELEASE_TAG" --repo "${GITHUB_REPOSITORY}" "${assets[@]}" --clobber
